name: Replicarr
version: "0.1.1"
slug: replicarr
description: A dashboard to manage and sync multiple Syncthing instances from one place.
url: https://github.com/Fully-Local-Admin/replicarr
arch:
  - aarch64
  - amd64
  - armv7
init: false
ingress: true
ingress_port: 8099
panel_icon: mdi:sync
panel_title: Replicarr
apparmor: false
options:
  log_level: info
  instances: []
schema:
  log_level: "list(trace|debug|info|notice|warning|error|fatal)?"
  instances:
    - name: str
      url: url
      api_key: password
